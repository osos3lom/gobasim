{{define "content"}}
<div class="space-y-6 flex flex-col h-[calc(100vh-140px)]">

    <!-- Terminal Header Info -->
    <div class="flex items-center justify-between shrink-0">
        <div>
            <h3 class="text-lg font-bold text-white">Live Event Logger</h3>
            <p class="text-sm text-gray-400">Piping unified Go server logs directly to your session.</p>
        </div>
        <button id="clear-btn" class="px-4 py-2 bg-indigo-950 hover:bg-indigo-900 border border-indigo-800 text-indigo-300 font-semibold text-xs rounded-xl transition duration-200">
            Clear Window
        </button>
    </div>

    <!-- Terminal Window -->
    <div class="flex-1 bg-[#03060c] border border-indigo-950/60 rounded-2xl p-6 font-mono text-sm overflow-hidden flex flex-col shadow-2xl relative">
        <!-- Dot Accents -->
        <div class="absolute top-4 left-4 flex space-x-2 shrink-0">
            <span class="w-3 h-3 rounded-full bg-red-500/80"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500/80"></span>
            <span class="w-3 h-3 rounded-full bg-emerald-500/80"></span>
        </div>

        <div class="absolute top-3 right-6 text-xs text-indigo-500 shrink-0 select-none">
            log_streamer.go
        </div>

        <!-- Terminal Body -->
        <div id="log-window" class="mt-6 flex-1 overflow-y-auto space-y-2 text-indigo-200 select-text pr-2 scrollbar">
            <div class="text-gray-500 select-none">// Sawt Unified Daemon live event logging established. Waiting for packets...</div>
        </div>
    </div>

</div>

<!-- JavaScript to stream logs via SSE -->
<script>
    const logWindow = document.getElementById('log-window');
    const clearBtn = document.getElementById('clear-btn');
    
    // Connect to Server-Sent Events endpoint
    const eventSource = new EventSource('/api/logs');

    eventSource.onmessage = function(event) {
        const line = document.createElement('div');
        line.className = 'py-0.5 border-b border-indigo-950/20 last:border-0 leading-relaxed';
        
        // Escape HTML
        const safeText = event.data
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
            
        line.innerHTML = `<span class="text-indigo-400 select-none">&gt;</span> <span class="text-slate-300">${safeText}</span>`;
        logWindow.appendChild(line);
        
        // Auto scroll to bottom
        logWindow.scrollTop = logWindow.scrollHeight;
    };

    eventSource.onerror = function(err) {
        console.error("SSE connection error: ", err);
        const line = document.createElement('div');
        line.className = 'text-red-400 font-semibold py-1';
        line.innerHTML = `[!] SSE Log connection lost. Reconnecting...`;
        logWindow.appendChild(line);
        logWindow.scrollTop = logWindow.scrollHeight;
    };

    clearBtn.addEventListener('click', () => {
        logWindow.innerHTML = '<div class="text-gray-500 select-none">// Terminal cleared. Listening...</div>';
    });
</script>

<style>
    /* Styling scrollbar for terminal */
    .scrollbar::-webkit-scrollbar {
        width: 6px;
    }
    .scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.1);
    }
    .scrollbar::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.2);
        border-radius: 4px;
    }
    .scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.4);
    }
</style>
{{end}}
